<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jogo da Velha</title>
  <style>
    :root{--bg:#f7f7f9;--card:#fff;--accent:#333;--accent2:#28a745}
    body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .wrap{background:var(--card);padding:22px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.15);width:100%;max-width:420px}
    h1{text-align:center;margin-bottom:12px;font-size:22px;color:var(--accent)}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
    .cell{background:#f1f3f5;border-radius:8px;height:90px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#222;cursor:pointer;user-select:none}
    .controls{display:flex;justify-content:space-between;align-items:center}
    .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
    .btn-reset{background:#ff6b6b;color:#fff}
    .btn-back{background:#6c757d;color:#fff}
    .status{font-size:14px;color:#555}
    .score{margin-top:10px;font-size:14px;color:#333;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Jogo da Velha — Jogar com amigos</h1>

    <div class="controls">
      <div class="status">Vez de: <strong id="player">X</strong></div>
      <div>
        <button class="btn btn-reset" id="reset">Reiniciar</button>
        <a href="/" style="text-decoration:none"><button class="btn btn-back">Voltar</button></a>
      </div>
    </div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="score">
      Placar — X: <span id="scoreX">0</span> | O: <span id="scoreO">0</span>
    </div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const cells = Array.from(document.querySelectorAll('.cell'));
    const playerEl = document.getElementById('player');
    const resetBtn = document.getElementById('reset');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');

    let board = Array(9).fill('');
    let current = 'X';
    let scores = { X: 0, O: 0 };

    // Carregar placar do localStorage
    try { const s = JSON.parse(localStorage.getItem('ttt-scores')); if (s) scores = s; } catch(e){}
    scoreXEl.textContent = scores.X; scoreOEl.textContent = scores.O;

    function setStatus(){ playerEl.textContent = current }

    function checkWinner(bd){
      const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      for(const [a,b,c] of wins){
        if(bd[a] && bd[a] === bd[b] && bd[a] === bd[c]) return bd[a];
      }
      if(bd.every(Boolean)) return 'draw';
      return null;
    }

    function render(){
      cells.forEach((el,i)=> el.textContent = board[i]);
    }

    function saveScores(){ localStorage.setItem('ttt-scores', JSON.stringify(scores)); }

    function handleClick(e){
      const idx = Number(e.currentTarget.dataset.index);
      if(board[idx]) return; // já marcado
      board[idx] = current;
      render();
      const result = checkWinner(board);
      if(result){
        if(result === 'draw'){
          alert('Empate!');
        } else {
          alert('Jogador ' + result + ' venceu!');
          scores[result] = (scores[result] || 0) + 1;
          scoreXEl.textContent = scores.X; scoreOEl.textContent = scores.O;
          saveScores();
        }
        board = Array(9).fill('');
        render();
        current = 'X';
        setStatus();
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      setStatus();
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    resetBtn.addEventListener('click', ()=>{
      if(confirm('Reiniciar placar também?')){ scores = {X:0,O:0}; saveScores(); scoreXEl.textContent = 0; scoreOEl.textContent = 0 }
      board = Array(9).fill(''); render(); current = 'X'; setStatus();
    });

    setStatus();
    render();
  </script>
</body>
</html>
