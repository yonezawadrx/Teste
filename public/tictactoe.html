<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jogo da Velha</title>
  <style>
    :root{--bg:#f7f7f9;--card:#fff;--accent:#333;--accent2:#28a745}
    body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .wrap{background:var(--card);padding:22px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.15);width:100%;max-width:420px}
    h1{text-align:center;margin-bottom:12px;font-size:22px;color:var(--accent)}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
    .cell{background:#f1f3f5;border-radius:8px;height:90px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#222;cursor:pointer;user-select:none}
    .controls{display:flex;justify-content:space-between;align-items:center}
    .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
    .btn-reset{background:#ff6b6b;color:#fff}
    .btn-back{background:#6c757d;color:#fff}
    .status{font-size:14px;color:#555}
    .score{margin-top:10px;font-size:14px;color:#333;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Jogo da Velha — Jogar com amigos</h1>

    <div class="controls">
      <div class="status">Vez de: <strong id="player">X</strong></div>
      <div>
        <button class="btn btn-reset" id="reset">Reiniciar</button>
        <a href="/" style="text-decoration:none"><button class="btn btn-back">Voltar</button></a>
      </div>
    </div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="score">
      Placar — X: <span id="scoreX">0</span> | O: <span id="scoreO">0</span>
    </div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const playerEl = document.getElementById('player');
    const resetBtn = document.getElementById('reset');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');

    let board = Array(9).fill('');
    let current = 'X';
    let scores = { X: 0, O: 0 };
    let lastWinner = null;

    function render(){
      boardEl.innerHTML = '';
      for(let i=0;i<9;i++){
        const el = document.createElement('div');
        el.className = 'cell';
        el.dataset.index = i;
        el.textContent = board[i] || '';
        el.addEventListener('click', () => makeMove(i));
        boardEl.appendChild(el);
      }
    }

    async function fetchState(){
      try {
        const response = await fetch('/api/jogo');
        const state = await response.json();
        board = state.board || Array(9).fill('');
        current = state.current || 'X';
        scores = state.scores || { X: 0, O: 0 };
        playerEl.textContent = current;
        scoreXEl.textContent = scores.X || 0;
        scoreOEl.textContent = scores.O || 0;
        render();

        if (state.winner && state.winner !== lastWinner) {
          lastWinner = state.winner;
          if (state.winner === 'draw') alert('Empate!');
          else alert('Jogador ' + state.winner + ' venceu!');
        }

        if (!state.winner) {
          lastWinner = null;
        }
      } catch (error) {
        console.error('Erro ao buscar estado do jogo:', error);
      }
    }

    async function makeMove(index) {
      try {
        const response = await fetch('/api/jogo/move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ index })
        });
        const state = await response.json();
        if (!response.ok) {
          return alert(state.erro || 'Movimento inválido');
        }
        board = state.board;
        current = state.current;
        scores = state.scores || { X: 0, O: 0 };
        playerEl.textContent = current;
        scoreXEl.textContent = scores.X || 0;
        scoreOEl.textContent = scores.O || 0;
        render();
      } catch (error) {
        console.error('Erro ao enviar movimento:', error);
      }
    }

    resetBtn.addEventListener('click', async () => {
      if (!confirm('Reiniciar o jogo?')) return;
      try {
        const response = await fetch('/api/jogo/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ starter: 'X' })
        });
        const state = await response.json();
        board = state.board;
        current = state.current;
        scores = state.scores || { X: 0, O: 0 };
        playerEl.textContent = current;
        scoreXEl.textContent = scores.X || 0;
        scoreOEl.textContent = scores.O || 0;
        lastWinner = null;
        render();
      } catch (error) {
        console.error('Erro ao resetar jogo:', error);
      }
    });

    fetchState();
    setInterval(fetchState, 1500);
  </script>
</body>
</html>
